<!doctype html>
<html><head><meta charset="utf-8"><title>Teste API</title></head>
<body style="font-family:monospace;padding:2rem;background:#1a1a1a;color:#e8e8e8">
<h2>Teste API Essenza</h2>
<div id="login" style="margin-bottom:1rem">
  <input id="senha" type="password" placeholder="Senha" style="padding:8px;font-size:1rem">
  <button id="btnLogin" style="padding:8px 16px;font-size:1rem">Login e Testar Tudo</button>
</div>
<div id="r" style="white-space:pre-wrap;line-height:2"></div>
<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script>
var R = document.getElementById("r");
function log(msg) { R.innerHTML += msg + "\n"; }

var api = window.EssenzaApi.request;

document.getElementById("btnLogin").onclick = function() {
  var senha = document.getElementById("senha").value;
  if (!senha) { log("Digite a senha"); return; }
  R.innerHTML = "";
  var token;

  log("1. Fazendo login...");
  api({action:"Auth.Login",password:senha}).then(function(d) {
    if (!d || !d.ok) throw new Error("LOGIN FALHOU: " + (d && d.message || "erro"));
    token = d.token;
    log("✅ LOGIN OK");

    log("\n2. Criando lancamento de teste...");
    return api({action:"Lancamentos.Criar",sheet:"Lancamentos",token:token,payload:JSON.stringify({
      Data_Competencia:"2099-12-31",Tipo:"Entrada",Categoria:"Produto",
      Descricao:"ZZZTESTE EXCLUIR",Valor:"1",Status:"Pendente"
    })});
  }).then(function(d2) {
    if (!d2 || !d2.ok) throw new Error("CRIAR FALHOU: " + JSON.stringify(d2));
    log("✅ CRIAR OK");

    log("\n3. Buscando lancamento criado...");
    return api({action:"Lancamentos.Listar",sheet:"Lancamentos",token:token,page:"1",limit:"500",
      q:"ZZZTESTE EXCLUIR"});
  }).then(function(d3) {
    if (!d3 || !d3.ok) throw new Error("LISTAR FALHOU: " + JSON.stringify(d3));
    var items = d3.items || [];
    log("   Encontrados: " + items.length + " com filtro");

    if (!items.length) throw new Error("Nao encontrou o lancamento de teste!");
    var teste = items[0];
    log("   rowIndex=" + teste.rowIndex + " desc=" + teste.Descricao);

    log("\n4. Excluindo (rowIndex=" + teste.rowIndex + ")...");
    return api({action:"Lancamentos.Excluir",sheet:"Lancamentos",token:token,rowIndex:String(teste.rowIndex)});
  }).then(function(d4) {
    if (d4 && d4.ok) {
      log("✅ EXCLUIR OK: " + d4.message);
    } else {
      log("❌ EXCLUIR FALHOU: " + JSON.stringify(d4));
    }
    log("\n--- TODOS OS TESTES PASSARAM ---");
  }).catch(function(e) {
    log("❌ ERRO: " + e.message);
  });
};
</script>
</body></html>
