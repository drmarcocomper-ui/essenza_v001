<!doctype html>
<html><head><meta charset="utf-8"><title>Teste API</title></head>
<body style="font-family:monospace;padding:2rem;background:#1a1a1a;color:#e8e8e8">
<h2>Teste API Essenza</h2>
<div id="login" style="margin-bottom:1rem">
  <input id="senha" type="password" placeholder="Senha" style="padding:8px;font-size:1rem">
  <button id="btnLogin" style="padding:8px 16px;font-size:1rem">Login e Testar</button>
</div>
<div id="r" style="white-space:pre-wrap;line-height:2"></div>
<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script>
var R = document.getElementById("r");
function log(msg) { R.innerHTML += msg + "\n"; }

var api = window.EssenzaApi.request;

document.getElementById("btnLogin").onclick = function() {
  var senha = document.getElementById("senha").value;
  if (!senha) { log("Digite a senha"); return; }
  R.innerHTML = "";

  log("1. Fazendo login...");
  api({action:"Auth.Login",password:senha}).then(function(d) {
    if (!d || !d.ok) {
      log("❌ LOGIN FALHOU: " + (d && d.message || "erro"));
      return;
    }
    var token = d.token;
    log("✅ LOGIN OK - token recebido");

    log("\n2. Testando Listar com token...");
    return api({action:"Lancamentos.Listar",sheet:"Lancamentos",page:"1",limit:"2",token:token}).then(function(d2) {
      log("✅ LISTAR OK: " + (d2.items ? d2.items.length : 0) + " items");

      log("\n3. Testando Criar com token...");
      return api({action:"Lancamentos.Criar",sheet:"Lancamentos",token:token,payload:JSON.stringify({
        Data_Competencia:"2026-03-10",
        Tipo:"Entrada",
        Categoria:"Produto",
        Descricao:"TESTE APAGAR",
        Valor:"1",
        Status:"Pendente"
      })});
    }).then(function(d3) {
      if (d3 && d3.ok) {
        log("✅ CRIAR OK: " + d3.message);
      } else {
        log("❌ CRIAR FALHOU: " + JSON.stringify(d3));
      }

      log("\n4. Testando Validate com token...");
      return api({action:"Auth.Validate",token:token});
    }).then(function(d4) {
      if (d4 && d4.ok && d4.valid) {
        log("✅ VALIDATE OK: token valido");
      } else {
        log("❌ VALIDATE FALHOU: " + JSON.stringify(d4));
      }
      log("\n--- FIM DOS TESTES ---");
    });
  }).catch(function(e) {
    log("❌ ERRO: " + e.message);
  });
};
</script>
</body></html>
