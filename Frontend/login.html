<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon-192.svg" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#8b5ca5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
  <title>Login | Essenza</title>

  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--cor-primaria), #9a6fb3);
      padding: 1rem;
    }

    .login-card {
      background: var(--cor-bg);
      border-radius: var(--raio);
      box-shadow: var(--sombra);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }

    .login-header {
      background: var(--cor-primaria);
      color: #fff;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .login-header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .login-header p {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .login-body {
      padding: 2rem 1.5rem;
    }

    .login-body .field {
      margin-bottom: 1.5rem;
    }

    .login-body .btn--primary {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
    }

    .input-password-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-password-wrap .input {
      padding-right: 2.5rem;
      width: 100%;
    }

    .btn-toggle-senha {
      position: absolute;
      right: 0.5rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--cor-muted, #888);
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-toggle-senha:hover {
      color: var(--cor-primaria);
    }

    .login-feedback {
      margin-top: 1rem;
      font-size: 0.9rem;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      background: #f7f7f7;
      border: 1px solid var(--cor-borda);
      text-align: center;
    }

    .login-feedback:empty {
      display: none;
    }

    .login-feedback[data-type="error"] {
      background: #fff0f0;
      border-color: rgba(220, 20, 60, 0.25);
      color: #c41e3a;
    }

    .login-feedback[data-type="success"] {
      background: #f0fff0;
      border-color: rgba(0, 128, 0, 0.25);
      color: #228b22;
    }

    .login-feedback[data-type="info"] {
      background: #f0f8ff;
      border-color: rgba(70, 130, 180, 0.25);
      color: #4169e1;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <button type="button" id="themeToggle" class="theme-toggle" style="position:fixed; top:1rem; right:1rem;">🌙</button>
    <div class="login-card">
      <div class="login-header">
        <h1>Essenza</h1>
        <p>Sistema de Gestao</p>
      </div>

      <div class="login-body">
        <form id="formLogin" autocomplete="on">
          <div class="field">
            <label class="label" for="senha">Senha</label>
            <div class="input-password-wrap">
              <input
                class="input"
                type="password"
                id="senha"
                name="senha"
                required
                autofocus
                placeholder="Digite sua senha"
              />
              <button type="button" id="btnToggleSenha" class="btn-toggle-senha" aria-label="Mostrar senha" tabindex="-1">
                <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" id="btnEntrar" class="btn btn--primary">
            Entrar
          </button>

          <div id="loginFeedback" class="login-feedback" aria-live="polite" role="status"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/login.js" defer></script>
</body>
</html>
